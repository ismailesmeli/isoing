<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>İsoing 1.5 - İngilizce Öğren</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        :root {
            --bg-primary: #0f0c29;
            --bg-secondary: #302b63;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            --gold: #ffd700;
            --gold-gradient: linear-gradient(90deg, #f7971e, #ffd200);
        }

        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #d9d9e3;
            --bg-card: rgba(0, 0, 0, 0.05);
            --text-primary: #1a1a2e;
            --text-secondary: #555;
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
        }

        .app-container {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 25px;
            max-width: 900px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            max-height: 98vh;
            overflow-y: auto;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .level-badge {
            background: rgba(255, 215, 0, 0.15);
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-weight: 600;
            font-size: 14px;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 50px;
            flex-wrap: wrap;
        }
        [data-theme="light"] .stats { background: rgba(0,0,0,0.08); }

        .stats span { display: flex; align-items: center; gap: 4px; }
        .stats .score { color: #4fc3f7; }
        .stats .lives { color: #ff6b6b; }
        .stats .xp { color: #ffd700; }
        .stats .coin { color: #ff9800; }
        .stats .streak { color: #ff5722; }

        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MENU */
        .menu {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0 15px;
        }

        .menu button {
            padding: 8px 14px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            transition: 0.3s;
        }

        .menu button:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }
        .menu button.active {
            background: var(--gold-gradient);
            color: #1a1a2e;
            border-color: var(--gold);
        }

        /* GAME AREA */
        .game-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 30px;
            padding: 25px 20px;
            min-height: 380px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        [data-theme="light"] .game-area { background: rgba(0,0,0,0.04); }

        .game-area h2 {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .game-area p {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 500px;
            line-height: 1.6;
        }

        /* CARDS */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin: 10px auto;
        }

        .card {
            aspect-ratio: 1/1;
            background: linear-gradient(145deg, #3a3a5c, #2a2a44);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid var(--border-color);
            text-align: center;
            padding: 5px;
            word-break: break-word;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.2);
            transform-style: preserve-3d;
            perspective: 600px;
        }
        [data-theme="light"] .card { background: linear-gradient(145deg, #e0e0e0, #c8c8c8); color: #1a1a2e; }

        .card.flipped {
            background: linear-gradient(145deg, #4fc3f7, #2196f3);
            border-color: #4fc3f7;
            transform: rotateY(180deg) scale(0.97);
        }
        [data-theme="light"] .card.flipped { background: linear-gradient(145deg, #4fc3f7, #2196f3); color: #fff; }

        .card.matched {
            background: linear-gradient(145deg, #66bb6a, #388e3c);
            border-color: #66bb6a;
            cursor: default;
            opacity: 0.8;
            transform: scale(0.95);
        }
        .card .card-inner { transform: rotateY(180deg); }

        /* OPTIONS */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 500px;
            margin: 10px 0;
        }

        .option-btn {
            padding: 14px 10px;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        .option-btn:hover { background: rgba(255,255,255,0.1); }
        .option-btn.correct { background: #2e7d32; border-color: #66bb6a; }
        .option-btn.wrong { background: #c62828; border-color: #ef5350; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.6; }

        .question-text {
            font-size: 20px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border-left: 4px solid var(--gold);
            width: 100%;
            max-width: 550px;
        }
        .question-text .blank {
            display: inline-block;
            min-width: 80px;
            border-bottom: 3px dashed var(--gold);
            color: var(--gold);
            font-weight: 700;
            padding: 0 6px;
        }

        .btn-primary {
            background: var(--gold-gradient);
            border: none;
            padding: 12px 35px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 16px;
            color: #1a1a2e;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.2);
        }
        .btn-primary:hover { transform: scale(1.03); }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border-color);
            padding: 10px 25px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.3s;
            margin: 4px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); color: var(--text-primary); }

        .feedback {
            margin: 12px 0;
            font-size: 18px;
            font-weight: 600;
            min-height: 35px;
        }
        .feedback.correct { color: #66bb6a; }
        .feedback.wrong { color: #ef5350; }

        .progress-bar {
            width: 100%;
            max-width: 500px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--gold-gradient);
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* INPUT */
        .text-input {
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            font-size: 18px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            outline: none;
        }
        .text-input:focus { border-color: var(--gold); }

        /* BADGES */
        .badge-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0;
        }
        .badge {
            background: rgba(255,215,0,0.1);
            border: 1px solid var(--gold);
            border-radius: 50px;
            padding: 4px 14px;
            font-size: 13px;
            color: var(--gold);
        }
        .badge.unlocked { background: rgba(255,215,0,0.2); }
        .badge.locked { opacity: 0.4; }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .app-container { padding: 15px; max-height: 95vh; }
            .card-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .options-grid { grid-template-columns: 1fr; }
            .stats { font-size: 12px; padding: 4px 12px; gap: 10px; }
            .logo h1 { font-size: 18px; }
            .question-text { font-size: 16px; }
            .menu button { font-size: 11px; padding: 6px 10px; }
            .header { gap: 6px; }
            .level-badge { font-size: 12px; padding: 4px 12px; }
        }
        @media (max-width: 400px) {
            .card-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* SCROLL */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        /* CONFETTI */
        .confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            top: -10px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* SPEAK BUTTON */
        .speak-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 50%;
            transition: 0.3s;
            color: var(--text-primary);
        }
        .speak-btn:hover { background: rgba(255,255,255,0.1); }

        /* MIC */
        .mic-btn {
            background: var(--gold-gradient);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 28px;
            cursor: pointer;
            transition: 0.3s;
            color: #1a1a2e;
        }
        .mic-btn:hover { transform: scale(1.05); }
        .mic-btn.listening { animation: pulse 0.8s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(255,215,0,0.5); }
        }

        /* BOSS LEVEL */
        .boss-health {
            width: 100%;
            max-width: 400px;
            height: 20px;
            background: rgba(255,0,0,0.2);
            border-radius: 10px;
            border: 2px solid #ff1744;
            overflow: hidden;
            margin: 10px 0;
        }
        .boss-health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff1744, #ff6b6b);
            width: 100%;
            transition: width 0.5s;
        }
        .boss-label {
            color: #ff1744;
            font-weight: 700;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <!-- HEADER -->
    <div class="header">
        <div class="logo">

            <span class="level-badge" id="levelDisplay">A1 · Lv.1</span>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" title="Tema Değiştir">🌙</button>
            <div class="stats">

        </div>
    </div>

    <!-- MENU -->
    <div class="menu" id="mainMenu">
        <button data-game="match" class="active">🧠 Eşleştir</button>

        <button data-game="speed">⚡ Hızlı</button>
        <button data-game="boss">👹 Boss</button>
        <button data-game="memory">🧠 Hafıza</button>
        <button data-game="daily">📅 Günün</button>
        <button data-game="dialogue">💬 Diyalog</button>

        <button data-game="write">⌨️ Yazma</button>
        <button data-game="listen">👂 Dinleme</button>
        <button data-game="stats">📊 İstatistik</button>
        <button data-game="review">📌 Tekrar</button>
    </div>

    <!-- GAME AREA -->
    <div class="game-area" id="gameArea">
        <h2>🎮 İsoing 1.5'e Hoş Geldin!</h2>

        <button class="btn-primary" id="startGameBtn">🚀 Başla</button>
    </div>
</div>

// 3. YARDIMCI FONKSİYONLAR
// ============================================================
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getRandomWords(count, level = state.level) {
    const start = (level - 1) * 50;
    const end = Math.min(start + 50, WORD_POOL.length);
    const pool = WORD_POOL.slice(start, end);
    const shuffled = shuffleArray([...pool]);
    return shuffled.slice(0, Math.min(count, shuffled.length));
}

function speak(text) {
    if (!window.speechSynthesis) return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.9;
    speechSynthesis.speak(utterance);
}

function getExampleSentences(word) {
    const templates = [
        `I see a ___ in the garden.`,
        `She has a ___ at home.`,
        `The ___ is very nice.`,
        `I like this ___ very much.`,
        `My friend has a ___.`,
        `We need a ___ now.`,
        `The ___ is on the table.`,
        `This ___ is beautiful.`,
        `He bought a ___.`,
        `They found a ___.`
    ];
    const sentence = templates[Math.floor(Math.random() * templates.length)].replace('___', word);
    return [
        sentence,
        `"${word}" is a common word.`,
        `I learned "${word}" today.`
    ];
}

function generateAIExamples(word) {
    return getExampleSentences(word);
}

function showConfetti() {
    const container = document.createElement('div');
    container.className = 'confetti-container';
    const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bcb', '#ff9f43'];
    for (let i = 0; i < 80; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + '%';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (Math.random() * 8 + 4) + 'px';
        el.style.height = (Math.random() * 8 + 4) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
        el.style.animationDelay = (Math.random() * 0.8) + 's';
        container.appendChild(el);
    }
    document.body.appendChild(container);
    setTimeout(() => container.remove(), 3500);
}

function vibrate(duration = 100) {
    if (navigator.vibrate) navigator.vibrate(duration);
}

function addXP(amount) {
    state.xp += amount;
    const newLevel = Math.floor(state.xp / 100) + 1;
    if (newLevel > state.level) {
        state.level = newLevel;
        checkBadges();
    }
    updateUI();
}

function addCoins(amount) {
    state.coins += amount;
    updateUI();
}

function addCorrect() {
    state.totalCorrect++;
    state.dailyGoalProgress++;
    updateUI();
}

function addWrong(word) {
    state.totalWrong++;
    const existing = state.wrongWords.find(w => w.en === word.en);
    if (existing) {
        existing.count++;
    } else {
        state.wrongWords.push({ ...word, count: 1 });
    }
    updateUI();
}

function checkBadges() {
    const badges = [];
    if (state.totalCorrect >= 100) badges.push('🏅 İlk 100 Kelime');
    if (state.totalCorrect >= 500) badges.push('🥈 500 Kelime');
    if (state.totalCorrect >= 1000) badges.push('🥇 1000 Kelime');
    if (state.streak >= 7) badges.push('🔥 7 Gün Seri');
    if (state.streak >= 30) badges.push('🌟 30 Gün Seri');
    if (state.level >= 5) badges.push('👑 A1 Yarısı');
    if (state.level >= 10) badges.push('👑 A1 Tamamlandı');
    if (state.totalCorrect > 0 && state.totalWrong === 0 && state.totalCorrect >= 10) badges.push('🎯 Hatasız 10');
    state.badges = [...new Set(badges)];
}

function updateUI() {
    document.getElementById('xpDisplay').textContent = state.xp;
    document.getElementById('coinDisplay').textContent = state.coins;
    document.getElementById('streakDisplay').textContent = state.streak;
    document.getElementById('livesDisplay').textContent = state.lives;
    document.getElementById('levelDisplay').textContent = `A1 · Lv.${state.level}`;
}

function saveState() {
    try {
        localStorage.setItem('isoing15', JSON.stringify(state));
    } catch(e) {}
}

function loadState() {
    try {
        const data = localStorage.getItem('isoing15');
        if (data) {
            const parsed = JSON.parse(data);
            Object.assign(state, parsed);
            // Streak kontrolü
            if (state.lastPlayDate) {
                const last = new Date(state.lastPlayDate);
                const today = new Date();
                const diff = (today - last) / (1000 * 60 * 60 * 24);
                if (diff > 1 && diff < 2) {
                    state.streak++;
                    addXP(50);
                } else if (diff >= 2) {
                    state.streak = 0;
                }
            }
            state.lastPlayDate = new Date().toISOString();
            updateUI();
            checkBadges();
        }
    } catch(e) {}
}

// 4.1 KART EŞLEŞTİR
function initMatch() {
    const words = getRandomWords(8);
    const pairs = [];
    words.forEach(w => {
        pairs.push({ id: w.en + '_en', text: w.en, pairId: w.en, type: 'en' });
        pairs.push({ id: w.tr + '_tr', text: w.tr, pairId: w.en, type: 'tr' });
    });
    gameVars.match = {
        cards: shuffleArray(pairs),
        flipped: [],
        matched: [],
        locked: false,
    };
    state.gameActive = true;
    renderMatch();
}

function renderMatch() {
    const { cards, matched } = gameVars.match;
    let html = `<h2>🧠 Kart Eşleştir</h2><p>İngilizce - Türkçe eşleştir</p>`;
    html += `<div class="progress-bar"><div class="progress-fill" style="width:${(matched.length / cards.length) * 100}%"></div></div>`;
    html += `<div class="card-grid">`;
    cards.forEach((card, i) => {
        const isFlipped = gameVars.match.flipped.includes(i);
        const isMatched = matched.includes(i);
        const content = isFlipped || isMatched ? card.text : '❓';
        let cls = 'card';
        if (isFlipped) cls += ' flipped';
        if (isMatched) cls += ' matched';
        html += `<div class="${cls}" data-index="${i}" data-pair="${card.pairId}" data-type="${card.type}">${content}</div>`;
    });
    html += `</div><div class="feedback" id="matchFeedback"></div>`;
    html += `<button class="btn-secondary" onclick="initMatch()">🔄 Yeni Kartlar</button>`;
    html += `<button class="btn-secondary" onclick="speak('${cards.find(c => c.type === 'en')?.text || 'hello'}')">🔊 Dinle</button>`;
    gameArea.innerHTML = html;
    document.querySelectorAll('.card').forEach(el => {
        el.addEventListener('click', onMatchClick);
    });
}

function onMatchClick(e) {
    if (!state.gameActive) return;
    const card = e.currentTarget;
    const idx = parseInt(card.dataset.index);
    const { flipped, matched, cards, locked } = gameVars.match;
    if (locked || flipped.includes(idx) || matched.includes(idx) || flipped.length >= 2) return;
    
    gameVars.match.flipped.push(idx);
    card.classList.add('flipped');
    card.textContent = cards[idx].text;

    if (gameVars.match.flipped.length === 2) {
        gameVars.match.locked = true;
        const idx1 = gameVars.match.flipped[0];
        const idx2 = gameVars.match.flipped[1];
        const c1 = cards[idx1], c2 = cards[idx2];
        const fb = document.getElementById('matchFeedback');
        
        if (c1.pairId === c2.pairId && c1.type !== c2.type) {
            gameVars.match.matched.push(idx1, idx2);
            setTimeout(() => {
                document.querySelectorAll('.card')[idx1].classList.add('matched');
                document.querySelectorAll('.card')[idx2].classList.add('matched');
                fb.textContent = '✅ Doğru! +15 XP, +20🪙';
                fb.className = 'feedback correct';
                addXP(15); addCoins(20); addCorrect();
                speak(c1.type === 'en' ? c1.text : c2.text);
                showConfetti();
                gameVars.match.flipped = [];
                gameVars.match.locked = false;
                const progress = (gameVars.match.matched.length / cards.length) * 100;
                document.querySelector('.progress-fill').style.width = progress + '%';
                if (gameVars.match.matched.length === cards.length) {
                    state.gameActive = false;
                    setTimeout(() => showLevelComplete(), 600);
                }
            }, 500);
        } else {
            setTimeout(() => {
                document.querySelectorAll('.card')[idx1].classList.remove('flipped');
                document.querySelectorAll('.card')[idx2].classList.remove('flipped');
                document.querySelectorAll('.card')[idx1].textContent = '❓';
                document.querySelectorAll('.card')[idx2].textContent = '❓';
                fb.textContent = '❌ Yanlış! -1 can';
                fb.className = 'feedback wrong';
                state.lives--;
                vibrate();
                addWrong(c1.type === 'en' ? c1 : c2);
                updateUI();
                gameVars.match.flipped = [];
                gameVars.match.locked = false;
                if (state.lives <= 0) {
                    state.gameActive = false;
                    setTimeout(() => showGameOver(), 400);
                }
            }, 700);
        }
    }
}

function initHangman() {
    const word = getRandomWords(1)[0];
    gameVars.hangman = {
        word: word.en.toLowerCase(),
        tr: word.tr,
        guessed: [],
        wrong: 0,
        maxWrong: 6,
    };
    state.gameActive = true;
    renderHangman();
}

function renderHangman() {
    const { word, tr, guessed, wrong, maxWrong } = gameVars.hangman;
    const display = word.split('').map(l => guessed.includes(l) ? l : '_').join(' ');
    const remaining = word.split('').filter(l => !guessed.includes(l)).length;
    
    let html = `<h2>🪢 Adam Asmaca</h2><p style="font-size:20px;font-family:monospace;">${display}</p>`;
    html += `<p>Yanlış: ${'❤️'.repeat(Math.max(0, maxWrong - wrong))} ${'💔'.repeat(wrong)}</p>`;
    html += `<p style="color:var(--text-secondary)">İpucu: ${tr}</p>`;
    html += `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:400px;margin:10px 0;">`;
    'abcdefghijklmnopqrstuvwxyz'.split('').forEach(l => {
        const disabled = guessed.includes(l) || wrong >= maxWrong || remaining === 0;
        html += `<button class="option-btn" data-letter="${l}" ${disabled ? 'disabled' : ''} style="min-width:36px;padding:8px;">${l}</button>`;
    });
    html += `</div><div class="feedback" id="hangmanFeedback"></div>`;
    html += `<button class="btn-secondary" onclick="initHangman()">🔄 Yeni Kelime</button>`;
    html += `<button class="speak-btn" onclick="speak('${word}')">🔊</button>`;
    gameArea.innerHTML = html;
    document.querySelectorAll('[data-letter]').forEach(btn => {
        btn.addEventListener('click', onHangmanGuess);
    });
}

function onHangmanGuess(e) {
    if (!state.gameActive) return;
    const btn = e.currentTarget;
    const letter = btn.dataset.letter;
    const { word, guessed, wrong, maxWrong, tr } = gameVars.hangman;
    if (guessed.includes(letter)) return;
    
    guessed.push(letter);
    if (word.includes(letter)) {
        btn.classList.add('correct');
        const remaining = word.split('').filter(l => !guessed.includes(l)).length;
        if (remaining === 0) {
            addXP(30); addCoins(30); addCorrect();
            showConfetti();
            document.getElementById('hangmanFeedback').textContent = '🎉 Tebrikler! +30 XP, +30🪙';
            document.getElementById('hangmanFeedback').className = 'feedback correct';
            state.gameActive = false;
            setTimeout(showLevelComplete, 1000);
        } else {
            document.getElementById('hangmanFeedback').textContent = '✅ Doğru harf!';
            document.getElementById('hangmanFeedback').className = 'feedback correct';
        }
    } else {
        gameVars.hangman.wrong++;
        btn.classList.add('wrong');
        vibrate();
        document.getElementById('hangmanFeedback').textContent = `❌ Yanlış! (${gameVars.hangman.wrong}/${maxWrong})`;
        document.getElementById('hangmanFeedback').className = 'feedback wrong';
        if (gameVars.hangman.wrong >= maxWrong) {
            state.gameActive = false;
            addWrong({ en: word, tr: tr });
            document.getElementById('hangmanFeedback').textContent = `💀 Kaybettin! Kelime: ${word}`;
            setTimeout(() => showGameOver(), 800);
            return;
        }
    }
    renderHangman();
}

function renderOrder() {

    let html = `<h2>📝 Doğru Sıralama</h2><p>Kelimeleri doğru sıraya koy</p>`;
    html += `<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:15px 0;">`;

    // Drag & drop simülasyonu - tıklama ile sıralama
    let selected = null;
    document.querySelectorAll('[data-index]').forEach(btn => {
        btn.addEventListener('click', function() {
            if (!state.gameActive) return;
            if (selected === null) {
                selected = this;
                this.style.border = '3px solid var(--gold)';
            } else if (selected === this) {
                selected.style.border = '';
                selected = null;

                const idx1 = parseInt(selected.dataset.index);
                const idx2 = parseInt(this.dataset.index);
                const temp = gameVars.order.words[idx1];
                gameVars.order.words[idx1] = gameVars.order.words[idx2];
                gameVars.order.words[idx2] = temp;
                selected.style.border = '';
                selected = null;
                renderOrder();
            }
        });
    });

    if (!state.gameActive) return;

// 4.9 HAFIZA OYUNU
function initMemory() {
    const words = getRandomWords(6);
    const pairs = shuffleArray([...words, ...words]);
    gameVars.memory = { pairs, flipped: [], matched: [], locked: false, showTime: 5 };
    state.gameActive = true;
    // Önce göster
    showMemory(true);
}

function showMemory(initial = false) {
    const { pairs, matched } = gameVars.memory;
    let html = `<h2>🧠 Hafıza Oyunu</h2><p>${initial ? '5 saniye boyunca kelimeleri ezberle!' : 'Eşleşen çiftleri bul'}</p>`;
    html += `<div class="card-grid">`;
    pairs.forEach((word, i) => {
        const isMatched = matched.includes(i);
        const show = initial || isMatched;
        const content = show ? word.en : '❓';
        let cls = 'card';
        if (isMatched) cls += ' matched';
        if (show && !initial) cls += ' flipped';
        html += `<div class="${cls}" data-index="${i}" data-word="${word.en}">${content}</div>`;
    });
    html += `</div><div class="feedback" id="memoryFeedback"></div>`;
    gameArea.innerHTML = html;
    
    if (initial) {
        setTimeout(() => {
            // Kartları kapat
            document.querySelectorAll('.card').forEach(el => {
                if (!el.classList.contains('matched')) {
                    el.textContent = '❓';
                    el.classList.remove('flipped');
                }
            });
            document.getElementById('memoryFeedback').textContent = '⏰ Zaman doldu! Eşleştirmeye başla!';
            // Event listener ekle
            document.querySelectorAll('.card').forEach(el => {
                el.addEventListener('click', onMemoryClick);
            });
        }, 5000);
    } else {
        document.querySelectorAll('.card').forEach(el => {
            el.addEventListener('click', onMemoryClick);
        });
    }
}

function onMemoryClick(e) {
    if (!state.gameActive) return;
    const card = e.currentTarget;
    const idx = parseInt(card.dataset.index);
    const { pairs, flipped, matched, locked } = gameVars.memory;
    if (locked || flipped.includes(idx) || matched.includes(idx) || flipped.length >= 2) return;
    
    card.textContent = pairs[idx].en;
    card.classList.add('flipped');
    gameVars.memory.flipped.push(idx);
    
    if (gameVars.memory.flipped.length === 2) {
        gameVars.memory.locked = true;
        const idx1 = gameVars.memory.flipped[0];
        const idx2 = gameVars.memory.flipped[1];
        const fb = document.getElementById('memoryFeedback');
        if (pairs[idx1].en === pairs[idx2].en && idx1 !== idx2) {
            gameVars.memory.matched.push(idx1, idx2);
            setTimeout(() => {
                document.querySelectorAll('.card')[idx1].classList.add('matched');
                document.querySelectorAll('.card')[idx2].classList.add('matched');
                fb.textContent = '✅ Eşleşti! +15 XP';
                fb.className = 'feedback correct';
                addXP(15); addCoins(15); addCorrect();
                gameVars.memory.flipped = [];
                gameVars.memory.locked = false;
                if (gameVars.memory.matched.length === pairs.length) {
                    state.gameActive = false;
                    setTimeout(showLevelComplete, 600);
                }
            }, 500);
        } else {
            setTimeout(() => {
                document.querySelectorAll('.card')[idx1].textContent = '❓';
                document.querySelectorAll('.card')[idx2].textContent = '❓';
                document.querySelectorAll('.card')[idx1].classList.remove('flipped');
                document.querySelectorAll('.card')[idx2].classList.remove('flipped');
                fb.textContent = '❌ Eşleşmedi!';
                fb.className = 'feedback wrong';
                gameVars.memory.flipped = [];
                gameVars.memory.locked = false;
            }, 700);
        }
    }
}

// 4.11 DİYALOG TAMAMLAMA
function initDialogue() {
    const word = getRandomWords(1)[0];
    const dialogues = [
        { q: `What is this?`, a: `This is a ___` },
        { q: `Do you have a ___?`, a: `Yes, I have a ___` },
        { q: `Where is the ___?`, a: `The ___ is here` },
        { q: `Can you see the ___?`, a: `Yes, I see the ___` },
    ];
    const d = dialogues[Math.floor(Math.random() * dialogues.length)];
    const question = d.q;
    const answerTemplate = d.a;
    const correctAnswer = answerTemplate.replace('___', word.en);
    gameVars.dialogue = { word, question, correctAnswer };
    state.gameActive = true;
    renderDialogue();
}

function renderDialogue() {
    const { word, question, correctAnswer } = gameVars.dialogue;
    let html = `<h2>💬 Diyalog Tamamlama</h2>`;
    html += `<div style="background:rgba(255,215,0,0.05);border-radius:16px;padding:20px;max-width:500px;margin:10px 0;">`;
    html += `<p style="font-size:18px;">🧑: ${question}</p>`;
    html += `<p style="font-size:18px;margin-top:10px;">👤: <input class="text-input" id="dialogueInput" placeholder="Cevabını yaz..." style="max-width:300px;"></p>`;
    html += `</div>`;
    html += `<button class="btn-primary" onclick="checkDialogue()">✅ Kontrol Et</button>`;
    html += `<div class="feedback" id="dialogueFeedback"></div>`;
    html += `<button class="speak-btn" onclick="speak('${correctAnswer}')">🔊</button>`;
    html += `<button class="btn-secondary" onclick="initDialogue()">🔄 Yeni</button>`;
    gameArea.innerHTML = html;
    document.getElementById('dialogueInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkDialogue();
    });
    speak(question);
}

function checkDialogue() {
    if (!state.gameActive) return;
    const input = document.getElementById('dialogueInput');
    const { correctAnswer, word } = gameVars.dialogue;
    const fb = document.getElementById('dialogueFeedback');
    if (input.value.trim().toLowerCase() === correctAnswer.toLowerCase()) {
        fb.textContent = '✅ Mükemmel! +25 XP, +25🪙';
        fb.className = 'feedback correct';
        addXP(25); addCoins(25); addCorrect();
        showConfetti();
        state.gameActive = false;
        setTimeout(showLevelComplete, 1000);
    } else {
        fb.textContent = `❌ Doğru cevap: "${correctAnswer}"`;
        fb.className = 'feedback wrong';
        vibrate();
        addWrong({ en: word.en, tr: word.tr });
        state.lives--;
        updateUI();
        if (state.lives <= 0) { state.gameActive = false; setTimeout(showGameOver, 500); }
    }
}

// 4.12 TELAFFUZ TESTİ
function initSpeak() {
    const word = getRandomWords(1)[0];
    gameVars.speak = { word: word.en, tr: word.tr };
    state.gameActive = true;
    renderSpeak();
}

function renderSpeak() {
    const { word, tr } = gameVars.speak;
    let html = `<h2>🎤 Telaffuz Testi</h2>`;
    html += `<p style="font-size:28px;font-weight:700;">${word}</p>`;
    html += `<button class="speak-btn" onclick="speak('${word}')">🔊 Dinle</button>`;
    html += `<p style="color:var(--text-secondary)">${tr}</p>`;
    html += `<button class="mic-btn" id="micBtn" onclick="startListening()">🎤</button>`;
    html += `<div class="feedback" id="speakFeedback"></div>`;
    html += `<button class="btn-secondary" onclick="initSpeak()">🔄 Yeni</button>`;
    gameArea.innerHTML = html;
}

function startListening() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        document.getElementById('speakFeedback').textContent = '❌ Tarayıcın ses tanımayı desteklemiyor. Chrome kullan.';
        return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = false;
    
    const btn = document.getElementById('micBtn');
    btn.classList.add('listening');
    btn.textContent = '🎤🔴';
    document.getElementById('speakFeedback').textContent = '🎤 Dinleniyor...';
    
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.toLowerCase().trim();
        const { word } = gameVars.speak;
        const fb = document.getElementById('speakFeedback');
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        
        if (transcript === word.toLowerCase()) {
            fb.textContent = `✅ Doğru Telaffuz! "${word}" +25 XP, +25🪙`;
            fb.className = 'feedback correct';
            addXP(25); addCoins(25); addCorrect();
            showConfetti();
            state.gameActive = false;
            setTimeout(showLevelComplete, 1000);
        } else {
            fb.textContent = `❌ Sen: "${transcript}" | Doğru: "${word}"`;
            fb.className = 'feedback wrong';
            vibrate();
            addWrong({ en: word, tr: 'telaffuz' });
            state.lives--;
            updateUI();
            if (state.lives <= 0) { state.gameActive = false; setTimeout(showGameOver, 500); }
        }
    };
    recognition.onerror = (e) => {
        const fb = document.getElementById('speakFeedback');
        btn.classList.remove('listening');
        btn.textContent = '🎤';
        fb.textContent = `❌ Hata: ${e.error}`;
        fb.className = 'feedback wrong';
    };
    recognition.start();
}

    const selected = btn.dataset.value;

        addWrong(correct);

// 4.16 TEKRAR ET (Zor Kelimeler)
function initReview() {
    if (state.wrongWords.length === 0) {
        gameArea.innerHTML = `
            <h2>📌 Tekrar Et</h2>
            <p>🎉 Hiç zor kelimen yok! Harika iş çıkarıyorsun.</p>
            <button class="btn-secondary" onclick="startGame()">🔙 Geri</button>
        `;
        return;
    }
    const words = state.wrongWords.slice(0, 10);
    gameVars.review = { words: shuffleArray(words), index: 0 };
    state.gameActive = true;
    showReview();
}

function showReview() {
    const { words, index } = gameVars.review;
    if (index >= words.length) {
        state.gameActive = false;
        showLevelComplete();
        return;
    }
    const word = words[index];
    const pool = getRandomWords(10);
    let options = [word.tr];
    pool.forEach(w => { if (w.tr !== word.tr && !options.includes(w.tr) && options.length < 4) options.push(w.tr); });
    options = shuffleArray(options);
    gameVars.review.current = { word, options, correct: word.tr };
    
    let html = `<h2>📌 Tekrar Et (Zor Kelimeler)</h2>`;
    html += `<p style="font-size:24px;font-weight:700;">${word.en}</p>`;
    html += `<button class="speak-btn" onclick="speak('${word.en}')">🔊</button>`;
    html += `<div class="options-grid">`;
    options.forEach(opt => {
        html += `<button class="option-btn" data-value="${opt}">${opt}</button>`;
    });
    html += `</div><div class="feedback" id="reviewFeedback"></div>`;
    html += `<p style="color:var(--text-secondary)">${index+1}/${words.length}</p>`;
    gameArea.innerHTML = html;
    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', onReviewAnswer);
    });
    speak(word.en);
}

function onReviewAnswer(e) {
    if (!state.gameActive) return;
    const btn = e.currentTarget;
    const selected = btn.dataset.value;
    const { current, words, index } = gameVars.review;
    const fb = document.getElementById('reviewFeedback');
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    
    if (selected === current.correct) {
        btn.classList.add('correct');
        fb.textContent = '✅ Doğru! +25 XP, +20🪙';
        fb.className = 'feedback correct';
        addXP(25); addCoins(20); addCorrect();
        showConfetti();
        // Zor kelimeden çıkar
        state.wrongWords = state.wrongWords.filter(w => w.en !== current.word.en);
    } else {
        btn.classList.add('wrong');
        fb.textContent = `❌ Doğru: ${current.correct}`;
        fb.className = 'feedback wrong';
        vibrate();
        addWrong(current.word);
        state.lives--;
        updateUI();
        if (state.lives <= 0) { state.gameActive = false; setTimeout(showGameOver, 500); return; }
    }
    gameVars.review.index++;
    setTimeout(() => { if (state.gameActive) showReview(); }, 1200);
}

// 5. EKRAN YÖNETİMİ
// ============================================================
const gameArea = document.getElementById('gameArea');

function showLevelComplete() {
    const total = state.totalCorrect + state.totalWrong;
    const rate = total > 0 ? Math.round((state.totalCorrect / total) * 100) : 0;
    let grade = '⭐';
    let bonus = 0;
    if (rate >= 90) { grade = '⭐⭐⭐ Perfect!'; bonus = 50; }
    else if (rate >= 70) { grade = '⭐⭐ Good!'; bonus = 30; }
    else { grade = '⭐ Fair!'; bonus = 10; }
    
    addXP(bonus);
    addCoins(bonus);
    checkBadges();
    saveState();
    
    let html = `<h2>🏆 Seviye Tamamlandı!</h2>`;
    html += `<p style="font-size:24px;">${grade}</p>`;
    html += `<p>Başarı: ${rate}% | +${bonus} XP Bonus | +${bonus}🪙</p>`;
    html += `<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:15px 0;">`;
    state.badges.forEach(b => {
        html += `<span class="badge unlocked">${b}</span>`;
    });
    html += `</div>`;
    html += `<button class="btn-primary" onclick="resetAndStart()">🚀 Devam Et</button>`;
    html += `<button class="btn-secondary" onclick="initStats()">📊 İstatistikler</button>`;
    gameArea.innerHTML = html;
    showConfetti();
    updateUI();
}

function showGameOver() {
    saveState();
    let html = `<h2>💔 Oyun Bitti!</h2>`;
    html += `<p>Seviye ${state.level} - XP: ${state.xp}</p>`;
    html += `<p>Doğru: ${state.totalCorrect} | Yanlış: ${state.totalWrong}</p>`;
    html += `<button class="btn-primary" onclick="resetAndStart()">🔄 Yeniden Başla</button>`;
    html += `<button class="btn-secondary" onclick="initStats()">📊 İstatistikler</button>`;
    gameArea.innerHTML = html;
}

function resetAndStart() {
    state.lives = 3;
    updateUI();
    startGame();
}

function showHome() {
    gameArea.innerHTML = `
        <h2>🎮 İsoing 1.5</h2>
        <p>12 oyun, XP sistemi, rozetler, sesli okuma ve daha fazlası...</p>
        <button class="btn-primary" onclick="startGame()">🚀 Başla</button>
    `;
}

// 6. ANA KONTROL
// ============================================================
function startGame() {
    state.gameActive = true;
    state.lives = 3;
    updateUI();
    
    switch(state.currentGame) {
        case 'match': initMatch(); break;
        case 'quiz': initQuiz(); break;
        case 'fill': initFill(); break;
        case 'hangman': initHangman(); break;
        case 'scramble': initScramble(); break;
        case 'order': initOrder(); break;
        case 'speed': initSpeed(); break;
        case 'boss': initBoss(); break;
        case 'memory': initMemory(); break;
        case 'daily': initDaily(); break;
        case 'dialogue': initDialogue(); break;
        case 'speak': initSpeak(); break;
        case 'write': initWrite(); break;
        case 'listen': initListen(); break;
        case 'stats': initStats(); break;
        case 'review': initReview(); break;
        default: initMatch();
    }
}

document.querySelectorAll('#mainMenu button').forEach(btn => {

});

    } else {
        document.documentElement.setAttribute('data-theme', 'light');
        this.textContent = '☀️';

});

});
